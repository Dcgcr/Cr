<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Clothes Rack</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- Splash -->
<div id="splash"></div>

<!-- Top Bar -->
<div id="topBar">
  Welcome to DC clothes rack, Select your choice
</div>

<!-- Content -->
<div id="container"></div>

<!-- Upload Page -->
<div id="uploadPage">
  <h2>Upload</h2>

  <div id="uploadBox">Click to select image</div>
  <input type="file" id="fileInput" hidden>

  <input id="captionInput" placeholder="Enter caption">

  <button id="confirmBtn">Confirm</button>
</div>

<script src="script.js"></script>

</body>
</html>
